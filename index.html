<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anni Metsäniitty – Portfolio</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/projects.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css" 
    integrity="sha384-UHRtZLI+pbxtHCWp1t77Bi1L4ZtiqrqD80Kn4Z8NTSRyMA2Fd33n5dQ8lWUE00s/" 
    crossorigin="anonymous">
</head>
<body>
<!--  Navbar -->
<nav class="navbar">
    <div class="nav-left" id="nav-left"></div>
    <div class="nav-logo" id="nav-logo"></div>
    <div class="nav-right" id="nav-right"></div>
</nav>

<main>
  <section id="home">
    <div class="decorative-flower flower-left">
      <img src="/assets/svgs/flower-main.svg" alt="" role="presentation" />
    </div>

    <div class="decorative-flower flower-right">
      <img src="/assets/svgs/flower-accent.svg" alt="" role="presentation" />
    </div>

    <div class="home-wrapper">
      <p class="home-intro" id="home-intro"></p>
      <h1 class="home-title" id="home-title"></h1>
      <p class="home-description" id="home-description"></p>
    </div>
  </section>

  <section id="projects">
    <div class="container">
      <div class="projects-header" id="projects-header"></div>

      <div class="projects-wrapper">
        <!-- Intro -->
        <div class="projects-intro" id="projects-intro"></div>

        <!-- Toolbar: search + tags + count -->
        <div class="projects-toolbar">
          <div class="projects-search">
            <label for="projects-search" class="visually-hidden" id="projects-search-label"></label>
            <input
              id="projects-search"
              type="search"
              autocomplete="off"
            />
          </div>

          <div class="projects-meta">
            <span class="projects-count-label">
              <span id="projects-count">0</span> <span id="projects-count-text"></span>
            </span>
          </div>
        </div>

        <!-- Tag chips -->
        <div id="projects-chips" class="projects-chips" aria-label="Filter by tag"></div>

        <!-- Dynamic grid injected by projects.js -->
        <div id="projects-grid" class="projects-grid"></div>

        <noscript>
          <p class="projects-noscript">
            Enable JavaScript to see my projects.
          </p>
        </noscript>
      </div>
    </div>
  </section>

    <section id="skills">
    <div class="container">
      <div class="section-header" id="skills-header"></div>

      <div class="skills-layout">
        <!-- Left: short narrative -->
        <div class="skills-intro" id="skills-intro"></div>

        <!-- Right: skill groups -->
        <div class="skills-groups" id="skills-groups"></div>
      </div>

      <!-- <p class="skills-footnote">
        A problem is a chance for you to do your best. – Duke Ellington
      </p>
    </div>-->
  </section>

  <section id="about">
    <div class="container">
      <div class="section-header" id="about-header"></div>
      <div class="about-grid">
        <div class="about-left" id="about-left"></div>
        <div class="about-right" id="about-right"></div>
      </div>
    </div>
  </section>

  <section id="contact">
    <div class="container">
      <div class="section-header" id="contact-header"></div>

      <div class="contact-layout">
        <!-- Left: copy -->
        <div class="contact-intro" id="contact-intro"></div>

        <!-- Right: contact card -->
        <div class="contact-card" aria-label="Contact details" id="contact-card"></div>
      </div>
    </div>
  </section>

</main>

<!-- Back to Top Button -->
<button id="backToTop" aria-label="Back to top">↑</button>

<script src="js/content.js" defer></script>
<script src="js/projects.js" defer></script>
<script src="js/main.js" defer></script>
    
</body>
</html>
